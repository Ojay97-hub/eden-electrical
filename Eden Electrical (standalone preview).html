  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

le=\"font-size:15px;color:#6b665a;margin:0 0 28px;\">Sign in to manage your website content.<\u002Fp>\n      <label style=\"display:block;font-size:14px;font-weight:600;color:#19372D;margin-bottom:8px;\">Email<\u002Flabel>\n      <input type=\"email\" value=\"phil@edenelectrical.co.uk\" style=\"width:100%;padding:14px;border-radius:10px;border:1px solid rgba(25,55,45,0.18);background:#fbfaf6;font-size:15px;margin-bottom:18px;\">\n      <label style=\"display:block;font-size:14px;font-weight:600;color:#19372D;margin-bottom:8px;\">Password<\u002Flabel>\n      <input type=\"password\" value=\"password\" style=\"width:100%;padding:14px;border-radius:10px;border:1px solid rgba(25,55,45,0.18);background:#fbfaf6;font-size:15px;margin-bottom:14px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;\"><label style=\"display:flex;align-items:center;gap:8px;font-size:14px;color:#4a463d;cursor:pointer;\"><input type=\"checkbox\" checked=\"\" style=\"width:16px;height:16px;accent-color:#19372D;\">Remember me<\u002Flabel><a href=\"#\" style=\"font-size:14px;color:#a8842a;text-decoration:none;\">Forgot password?<\u002Fa><\u002Fdiv>\n      <button type=\"submit\" style=\"width:100%;background:#19372D;color:#FCE893;border:none;font-weight:600;font-size:16px;padding:16px;border-radius:10px;cursor:pointer;\">Sign in<\u002Fbutton>\n    <\u002Fform>\n    <div style=\"text-align:center;margin-top:24px;\"><button onclick=\"{{ goSite }}\" style=\"background:none;border:none;color:rgba(255,255,255,0.65);font-size:14px;cursor:pointer;\">← Back to website<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ ADMIN ============ -->\n<sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh;background:#F6F3EC;display:grid;grid-template-columns:264px 1fr;\">\n  <!-- sidebar -->\n  <aside style=\"background:#19372D;padding:28px 20px;display:flex;flex-direction:column;\">\n    <img src=\"ad61925d-64c8-4afb-afd1-f1aeb8ffd855\" alt=\"Eden Electrical\" style=\"height:26px;width:auto;margin:6px 8px 32px;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(252,232,147,0.5);padding:0 12px;margin-bottom:12px;\">Page sections<\u002Fdiv>\n    <div style=\"display:grid;gap:4px;\">\n      <sc-for list=\"{{ adminItems }}\" as=\"it\" hint-placeholder-count=\"5\"><button onclick=\"{{ it.onClick }}\" style=\"{{ it.style }}\">{{ it.label }}<\u002Fbutton><\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"margin-top:auto;display:grid;gap:8px;\">\n      <button onclick=\"{{ goSite }}\" style=\"background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);color:#fff;font-size:14px;font-weight:600;padding:12px;border-radius:9px;cursor:pointer;\">View live site<\u002Fbutton>\n      <button onclick=\"{{ logOut }}\" style=\"background:none;border:none;color:rgba(255,255,255,0.55);font-size:14px;padding:8px;cursor:pointer;\">Log out<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Faside>\n  <!-- main -->\n  <main style=\"display:flex;flex-direction:column;height:100vh;overflow:auto;\">\n    <header style=\"position:sticky;top:0;background:rgba(246,243,236,0.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(25,55,45,0.1);padding:20px 40px;display:flex;justify-content:space-between;align-items:center;z-index:10;\">\n      <div><div style=\"font-size:13px;color:#8a8576;font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;\">CONTENT EDITOR<\u002Fdiv><div style=\"font-family:'IvyJournal',serif;font-size:24px;color:#19372D;\">Hero section<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:12px;align-items:center;\"><span style=\"font-size:13.5px;color:#6b9b6b;display:flex;align-items:center;gap:7px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#5da55d;\"><\u002Fspan>All changes saved<\u002Fspan><button onclick=\"{{ saveAdmin }}\" style=\"background:#D5B044;color:#19372D;border:none;font-weight:600;font-size:15px;padding:12px 24px;border-radius:9px;cursor:pointer;\">Save changes<\u002Fbutton><\u002Fdiv>\n    <\u002Fheader>\n    <div style=\"padding:40px;max-width:780px;width:100%;\">\n      <div style=\"background:#fff;border:1px solid rgba(25,55,45,0.1);border-radius:16px;padding:32px;margin-bottom:24px;\">\n        <div style=\"font-weight:600;font-size:16px;color:#19372D;margin-bottom:4px;\">Headline<\u002Fdiv>\n        <p style=\"font-size:13.5px;color:#8a8576;margin:0 0 14px;\">The large heading shown at the top of the homepage.<\u002Fp>\n        <input type=\"text\" value=\"Clean energy, expertly installed.\" style=\"width:100%;padding:14px;border-radius:10px;border:1px solid rgba(25,55,45,0.18);background:#fbfaf6;font-size:16px;font-family:'IvyJournal',serif;color:#19372D;\">\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid rgba(25,55,45,0.1);border-radius:16px;padding:32px;margin-bottom:24px;\">\n        <div style=\"font-weight:600;font-size:16px;color:#19372D;margin-bottom:4px;\">Intro paragraph<\u002Fdiv>\n        <p style=\"font-size:13.5px;color:#8a8576;margin:0 0 14px;\">Supporting text beneath the headline.<\u002Fp>\n        <textarea rows=\"3\" style=\"width:100%;padding:14px;border-radius:10px;border:1px solid rgba(25,55,45,0.18);background:#fbfaf6;font-size:15px;resize:vertical;line-height:1.6;\">Eden Electrical designs and fits solar panels, battery storage and EV charging across Kent &amp; the South East — MCS-certified work, honest advice and a price you can see up front.<\u002Ftextarea>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid rgba(25,55,45,0.1);border-radius:16px;padding:32px;margin-bottom:24px;\">\n        <div style=\"font-weight:600;font-size:16px;color:#19372D;margin-bottom:4px;\">Hero image<\u002Fdiv>\n        <p style=\"font-size:13.5px;color:#8a8576;margin:0 0 14px;\">Recommended 1200×1040px. JPG or PNG.<\u002Fp>\n        <div style=\"border:2px dashed rgba(25,55,45,0.22);border-radius:12px;padding:36px;text-align:center;background:#fbfaf6;cursor:pointer;\"><div style=\"font-size:30px;margin-bottom:8px;\">↑<\u002Fdiv><div style=\"font-weight:600;font-size:15px;color:#19372D;margin-bottom:4px;\">Drag an image here or click to upload<\u002Fdiv><div style=\"font-size:13px;color:#8a8576;\">PNG, JPG up to 10MB<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid rgba(25,55,45,0.1);border-radius:16px;padding:32px;\">\n        <div style=\"font-weight:600;font-size:16px;color:#19372D;margin-bottom:14px;\">Call-to-action buttons<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n          <div><label style=\"display:block;font-size:13.5px;font-weight:600;color:#19372D;margin-bottom:8px;\">Primary button<\u002Flabel><input type=\"text\" value=\"Try the cost calculator\" style=\"width:100%;padding:12px;border-radius:9px;border:1px solid rgba(25,55,45,0.18);background:#fbfaf6;font-size:14px;\"><\u002Fdiv>\n          <div><label style=\"display:block;font-size:13.5px;font-weight:600;color:#19372D;margin-bottom:8px;\">Secondary button<\u002Flabel><input type=\"text\" value=\"Get a free quote\" style=\"width:100%;padding:12px;border-radius:9px;border:1px solid rgba(25,55,45,0.18);background:#fbfaf6;font-size:14px;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ TOAST ============ -->\n<sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:200;background:#19372D;color:#FCE893;padding:16px 26px;border-radius:12px;box-shadow:0 20px 50px -20px rgba(0,0,0,0.5);font-weight:600;font-size:15px;border:1px solid rgba(213,176,68,0.3);display:flex;align-items:center;gap:12px;\"><span style=\"color:#D5B044;\">✓<\u002Fspan>{{ toast }}<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;defaultCalcTab&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;solar&quot;,&quot;battery&quot;,&quot;ev&quot;,&quot;bundle&quot;],&quot;default&quot;:&quot;solar&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showAccreditations&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    view: 'site',\n    openService: 0,\n    calcTab: (this.props && this.props.defaultCalcTab) || 'solar',\n    solarBeds: 1, solarOrient: 0, solarBill: 1400,\n    batteryCap: 10, batteryHasSolar: true,\n    evPower: 0, evMount: 0, evSmart: true, evLongRun: false,\n    bSolar: true, bBattery: true, bEv: false,\n    adminSection: 0,\n    toast: ''\n  };\n  fmt(n){ return '£' + Math.round(n).toLocaleString('en-GB'); }\n  r50(n){ return Math.round(n/50)*50; }\n  rng(lo,hi){ return this.fmt(this.r50(lo)) + ' – ' + this.fmt(this.r50(hi)); }\n  toastMsg(m){ this.setState({toast:m}); clearTimeout(this._t); this._t=setTimeout(()=>this.setState({toast:''}),3800); }\n  seg(a){ return `flex:1;min-width:0;padding:13px 8px;border-radius:9px;border:1px solid ${a?'#D5B044':'rgba(25,55,45,0.16)'};background:${a?'#19372D':'#fbfaf6'};color:${a?'#FCE893':'#3f3a32'};font:600 14px/1.2 'Hanken Grotesk',sans-serif;cursor:pointer;transition:all .15s;text-align:center;`; }\n  tab(a){ return `padding:13px 18px;border-radius:10px;border:none;background:${a?'#19372D':'transparent'};color:${a?'#FCE893':'#5b574d'};font:600 15px 'Hanken Grotesk',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;`; }\n  mkToggle(on,onClick){ return { on, onClick,\n    rowStyle:`display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:11px;border:1px solid ${on?'#D5B044':'rgba(25,55,45,0.16)'};background:${on?'rgba(213,176,68,0.12)':'#fbfaf6'};cursor:pointer;transition:all .15s;`,\n    boxStyle:`flex:none;width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid ${on?'#D5B044':'rgba(25,55,45,0.3)'};background:${on?'#D5B044':'#fff'};color:#19372D;font-weight:800;`,\n    icon: on?'✓':'' }; }\n\n  renderVals(){\n    const s=this.state, V=this;\n\n    const SV=[\n      {title:'Solar Panel Installation', tag:'Design → switch-on', blurb:'We design, supply and install high-efficiency rooftop solar tailored to your roof and your energy use — handling everything from the survey to the DNO paperwork.',\n        points:['MCS-certified panels & inverters','Bespoke system design for your roof','Smartphone generation monitoring','All DNO & G99 paperwork handled']},\n      {title:'Battery Storage', tag:'Use power on your terms', blurb:'Store the energy you generate and draw on it when you need it. Charge cheaply on off-peak tariffs and keep the lights on during outages.',\n        points:['Store excess solar for the evenings','Optional whole-home back-up','Charge on cheap off-peak tariffs','Scalable, modular capacity']},\n      {title:'EV Charging', tag:'Smart home chargers', blurb:'OZEV-approved home charge points, neatly fitted and ready for solar-aware smart charging so you fuel your car for less.',\n        points:['7 kW & 22 kW charge points','Tethered or untethered units','Solar-aware smart charging','Tidy, certified installation']},\n      {title:'O&M for Solar', tag:'On request', blurb:'Keep your system performing for decades with proactive monitoring, servicing and rapid fault-finding.',\n        points:['Performance monitoring & reporting','Panel cleaning & inspections','Inverter servicing & fault-finding','Priority callouts']}\n    ];\n    const serviceItems=SV.map((it,i)=>({\n      n:String(i+1).padStart(2,'0'), title:it.title, tag:it.tag, blurb:it.blurb, points:it.points,\n      open:s.openService===i, icon:s.openService===i?'–':'+',\n      onToggle:()=>this.setState(p=>({openService:p.openService===i?-1:i}))\n    }));\n\n    // SOLAR\n    const bedKwp=[3,4,5,6.5], bedLab=['1–2 bed','3 bed','4 bed','5+ bed'];\n    const orF=[1,0.85,0.62], orLab=['South','East / West','North'];\n    const kwp=bedKwp[s.solarBeds], panels=Math.round(kwp/0.43);\n    const sGen=Math.round(kwp*950*orF[s.solarOrient]);\n    const sSave=Math.min(Math.round(sGen*0.22), Math.round(s.solarBill*0.9));\n    const sPay=((kwp*1500)+(kwp*1900))/2/sSave;\n    const solarBedOptions=bedLab.map((l,i)=>({label:l,style:V.seg(s.solarBeds===i),onClick:()=>this.setState({solarBeds:i})}));\n    const solarOrientOptions=orLab.map((l,i)=>({label:l,style:V.seg(s.solarOrient===i),onClick:()=>this.setState({solarOrient:i})}));\n\n    // BATTERY\n    const bCostLo=s.batteryCap*750, bCostHi=s.batteryCap*950;\n    const bSave=s.batteryHasSolar? s.batteryCap*70 : s.batteryCap*45;\n    const bPay=(bCostLo+bCostHi)/2/bSave;\n\n    // EV\n    const evP=[7,22][s.evPower], evBase=[899,1499][s.evPower];\n    const evMountLab=['Tethered','Untethered'][s.evMount];\n    const evTotal=evBase+(s.evMount?60:0)+(s.evSmart?170:0)+(s.evLongRun?220:0);\n    const evPowerOptions=['7 kW','22 kW'].map((l,i)=>({label:l,style:V.seg(s.evPower===i),onClick:()=>this.setState({evPower:i})}));\n    const evMountOptions=['Tethered','Untethered'].map((l,i)=>({label:l,style:V.seg(s.evMount===i),onClick:()=>this.setState({evMount:i})}));\n\n    // BUNDLE\n    let blo=0,bhi=0,bsave=0,inc=[];\n    if(s.bSolar){blo+=4*1500;bhi+=4*1900;bsave+=Math.round(4*950*0.22);inc.push('4 kWp Solar');}\n    if(s.bBattery){blo+=10*750;bhi+=10*950;bsave+=700;inc.push('10 kWh Battery');}\n    if(s.bEv){blo+=899+170;bhi+=899+170;inc.push('7 kW EV Charger');}\n    const nSel=[s.bSolar,s.bBattery,s.bEv].filter(Boolean).length;\n    const disc=nSel>=2?0.08:0;\n    const bloD=blo*(1-disc), bhiD=bhi*(1-disc), saved=(blo+bhi)/2*disc;\n    const bndPay=bsave>0? ((bloD+bhiD)/2)/bsave : 0;\n\n    // RESULT by tab\n    let result;\n    if(s.calcTab==='solar'){\n      result={priceLabel:'Estimated installed cost', price:V.rng(kwp*1500,kwp*1900),\n        stats:[{label:'Recommended system',value:kwp+' kWp · ~'+panels+' panels'},\n               {label:'Annual generation',value:sGen.toLocaleString('en-GB')+' kWh'},\n               {label:'Estimated saving',value:V.fmt(sSave)+' / yr'},\n               {label:'Indicative payback',value:sPay.toFixed(1)+' years'}],\n        note:'Based on a typical Kent roof at current tariffs. Final price confirmed after a free survey.', cta:'Book a free survey'};\n    } else if(s.calcTab==='battery'){\n      result={priceLabel:'Estimated installed cost', price:V.rng(bCostLo,bCostHi),\n        stats:[{label:'Usable capacity',value:s.batteryCap+' kWh'},\n               {label:'Paired with solar',value:s.batteryHasSolar?'Yes':'No'},\n               {label:'Estimated saving',value:V.fmt(bSave)+' / yr'},\n               {label:'Indicative payback',value:bPay.toFixed(1)+' years'}],\n        note:'Savings assume off-peak charging and typical evening usage. Confirmed after survey.', cta:'Book a free survey'};\n    } else if(s.calcTab==='ev'){\n      result={priceLabel:'Fully installed from', price:V.fmt(V.r50(evTotal)),\n        stats:[{label:'Charge point',value:evP+' kW · '+evMountLab},\n               {label:'Smart charging',value:s.evSmart?'Included':'Not included'},\n               {label:'Cable run',value:s.evLongRun?'Extended (>10m)':'Standard (<10m)'},\n               {label:'Install time',value:'Typically half a day'}],\n        note:'Price includes standard fitting & certification. Grants applied where eligible.', cta:'Book my install'};\n    } else {\n      result={priceLabel: disc?('Bundle price (\\u2212'+Math.round(disc*100)+'%)'):'Estimated total', price: nSel? V.rng(bloD,bhiD) : '—',\n        stats:[{label:'Included',value: inc.length? inc.join(' + ') : 'Nothing selected'},\n               {label:'You save',value: saved>0? V.fmt(saved) : '—'},\n               {label:'Annual saving',value: bsave>0? V.fmt(bsave)+' / yr' : '—'},\n               {label:'Indicative payback',value: bndPay>0? bndPay.toFixed(1)+' years' : '—'}],\n        note:'Bundle two or more services for an 8% discount on the combined installation.', cta:'Book a free survey'};\n    }\n\n    const calcTabs=[['solar','Solar Panels'],['battery','Battery Storage'],['ev','EV Charging'],['bundle','Bundle & Save']]\n      .map(([k,l])=>({key:k,label:l,style:V.tab(s.calcTab===k),onClick:()=>this.setState({calcTab:k})}));\n\n    const adminItems=['Hero','About','Services','Testimonials','Contact'].map((l,i)=>({\n      label:l, style:`display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:9px;cursor:pointer;font:600 15px 'Hanken Grotesk',sans-serif;border:none;width:100%;text-align:left;background:${s.adminSection===i?'rgba(213,176,68,0.16)':'transparent'};color:${s.adminSection===i?'#FCE893':'rgba(255,255,255,0.7)'};`,\n      onClick:()=>this.setState({adminSection:i})\n    }));\n\n    return {\n      isSite:s.view==='site', isLogin:s.view==='login', isAdmin:s.view==='admin',\n      showTrust: this.props.showAccreditations ?? true,\n      goLogin:()=>this.setState({view:'login'}),\n      goSite:()=>this.setState({view:'site'}),\n      signIn:(e)=>{ if(e&&e.preventDefault)e.preventDefault(); this.setState({view:'admin'}); },\n      logOut:()=>this.setState({view:'site'}),\n      saveAdmin:()=>V.toastMsg('Changes saved to the live site.'),\n      submitContact:(e)=>{ e.preventDefault(); V.toastMsg(\"Thanks — we'll be in touch within one working day.\"); },\n      toast:s.toast,\n      serviceItems,\n      calcTabs, showSolar:s.calcTab==='solar', showBattery:s.calcTab==='battery', showEv:s.calcTab==='ev', showBundle:s.calcTab==='bundle',\n      solarBedOptions, solarOrientOptions, solarBill:s.solarBill, solarBillLabel:V.fmt(s.solarBill),\n      setSolarBill:(e)=>this.setState({solarBill:+e.target.value}),\n      batteryCap:s.batteryCap, setBatteryCap:(e)=>this.setState({batteryCap:+e.target.value}),\n      batterySolar:V.mkToggle(s.batteryHasSolar,()=>this.setState(p=>({batteryHasSolar:!p.batteryHasSolar}))),\n      evPowerOptions, evMountOptions,\n      evSmart:V.mkToggle(s.evSmart,()=>this.setState(p=>({evSmart:!p.evSmart}))),\n      evRun:V.mkToggle(s.evLongRun,()=>this.setState(p=>({evLongRun:!p.evLongRun}))),\n      bSolar:V.mkToggle(s.bSolar,()=>this.setState(p=>({bSolar:!p.bSolar}))),\n      bBattery:V.mkToggle(s.bBattery,()=>this.setState(p=>({bBattery:!p.bBattery}))),\n      bEv:V.mkToggle(s.bEv,()=>this.setState(p=>({bEv:!p.bEv}))),\n      result,\n      adminItems\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
